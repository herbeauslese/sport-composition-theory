<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Sport Composition Theory</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Ein Framework zur Zerlegung jeder Sportart in ihre fundamentalen Komponenten.">

  <!-- docsify-darklight-theme stylesheet (compatible with docsify-themeable) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-themeable/style.min.css" type="text/css">

  <!-- docsify-themeable: light theme as default -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" title="light">
  <!-- docsify-themeable: dark theme as alternative -->
  <link rel="stylesheet alternative" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css" title="dark">

  <!-- Custom overrides (component colors, bars, distance matrix, etc.) -->
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app">Lädt …</div>

  <script>
    window.$docsify = {
      name: 'Sport Composition Theory',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        pathNamespaces: ['/en'],
        placeholder: {
          '/en/': 'Search',
          '/': 'Suchen'
        },
        noData: {
          '/en/': 'No results.',
          '/': 'Keine Ergebnisse.'
        }
      },
      plugins: [
        // Set <html lang> based on current URL hash
        function (hook) {
          hook.doneEach(function () {
            var isEN = (location.hash || '').indexOf('#/en') === 0;
            document.documentElement.setAttribute('lang', isEN ? 'en' : 'de');
          });
        }
      ]
    };
  </script>

  <!-- Script order matches the working reference setup -->
  <!-- darklight-theme scripts come first -->
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-themeable/main.min.js" type="text/javascript"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/docsify-themeable/index.min.js" type="text/javascript"></script>

  <!-- Core docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- docsify-themeable last -->
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0"></script>
</body>
</html>
