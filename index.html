<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Sport Composition Theory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Ein Framework zur Zerlegung jeder Sportart in ihre fundamentalen Komponenten.">

  <!-- Themeable: provides CSS variables for the entire Docsify chrome -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- Custom overrides (component colors, bars, distance matrix, etc.) -->
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app">Lädt …</div>

  <script>
    window.$docsify = {
      name: 'Sport Composition Theory',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        pathNamespaces: ['/en'],
        placeholder: {
          '/en/': 'Search',
          '/': 'Suchen'
        },
        noData: {
          '/en/': 'No results.',
          '/': 'Keine Ergebnisse.'
        }
      },
      // Configuration for docsify-darklight-theme
      darklightTheme: {
        siteFont: 'inherit',
        defaultTheme: 'light',
        codeFontFamily: 'Roboto Mono, Monaco, courier, monospace',
        bodyFontSize: '17px',
        dark: {
          accent: '#58a6ff',
          toggleBackground: '#21262d',
          background: '#0d1117',
          textColor: '#e6edf3',
          codeTextColor: '#e6edf3',
          codeBackgroundColor: '#161b22',
          borderColor: '#30363d',
          blockQuoteColor: '#8b949e',
          highlightColor: '#58a6ff',
          sidebarSublink: '#8b949e',
          codeTypeColor: '#e6edf3',
          coverBackground: '#0d1117',
          toggleImage: 'url(//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        },
        light: {
          accent: '#155799',
          toggleBackground: '#ffffff',
          background: '#ffffff',
          textColor: '#222222',
          codeTextColor: '#222222',
          codeBackgroundColor: '#f6f8fa',
          borderColor: '#e0ddd8',
          blockQuoteColor: '#858585',
          highlightColor: '#155799',
          sidebarSublink: '#505d6b',
          codeTypeColor: '#091a28',
          coverBackground: '#ffffff',
          toggleImage: 'url(//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        }
      },
      plugins: [
        // Set <html lang> based on current URL hash
        function (hook) {
          hook.doneEach(function () {
            var isEN = (location.hash || '').indexOf('#/en') === 0;
            document.documentElement.setAttribute('lang', isEN ? 'en' : 'de');
          });
        }
      ]
    };
  </script>

  <!-- Core Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
</body>
</html>
