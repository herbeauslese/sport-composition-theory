<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Sport Composition Theory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Ein Framework zur Zerlegung jeder Sportart in ihre fundamentalen Komponenten.">

  <!-- Apply persisted theme before page renders to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app">Lädt …</div>

  <script>
    window.$docsify = {
      name: 'Sport Composition Theory',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        pathNamespaces: ['/en'],
        placeholder: {
          '/en/': 'Search',
          '/': 'Suchen'
        },
        noData: {
          '/en/': 'No results.',
          '/': 'Keine Ergebnisse.'
        }
      },
      plugins: [
        function (hook) {
          // Inject theme toggle button into navbar after each page render
          hook.doneEach(function () {
            if (document.getElementById('theme-toggle')) return;
            var nav = document.querySelector('.app-nav');
            if (!nav) return;
            var li = document.createElement('li');
            var btn = document.createElement('button');
            btn.id = 'theme-toggle';
            btn.className = 'theme-toggle';
            btn.type = 'button';
            btn.setAttribute('aria-label', 'Theme');
            li.appendChild(btn);
            nav.appendChild(li);
            updateLabel();
            btn.addEventListener('click', function () {
              var cur = document.documentElement.getAttribute('data-theme');
              var next = (cur === 'dark') ? 'light' : (cur === 'light') ? null : 'dark';
              if (next === null) {
                document.documentElement.removeAttribute('data-theme');
                try { localStorage.removeItem('theme'); } catch (e) {}
              } else {
                document.documentElement.setAttribute('data-theme', next);
                try { localStorage.setItem('theme', next); } catch (e) {}
              }
              updateLabel();
            });

            function updateLabel() {
              var attr = document.documentElement.getAttribute('data-theme');
              var mode = (attr === 'light' || attr === 'dark') ? attr : 'auto';
              var isEN = (location.hash || '').indexOf('#/en') === 0;
              var labels = {
                de: { auto: 'Theme: Auto', light: 'Theme: Hell', dark: 'Theme: Dunkel' },
                en: { auto: 'Theme: Auto', light: 'Theme: Light', dark: 'Theme: Dark' }
              };
              btn.textContent = labels[isEN ? 'en' : 'de'][mode];
            }
          });

          // Set <html lang> based on current path
          hook.doneEach(function () {
            var isEN = (location.hash || '').indexOf('#/en') === 0;
            document.documentElement.setAttribute('lang', isEN ? 'en' : 'de');
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
